  <!-- Up-tick badge -->
  <rect x="24" y="24" width="52" height="22" rx="11" fill="#2A262F"/>
  <text x="50" y="39" font-family="system-ui, sans-serif" font-size="10.5" font-weight="700" fill="white" text-anchor="middle">↑ CRO</text>
