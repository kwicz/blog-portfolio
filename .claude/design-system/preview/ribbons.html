<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">

</head>
<body>
<div class="card">

  <div class="lbl">Ribbon flag stamps · pinned top-left of imagery</div>
  <style>
    .ribbon-row { display:flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .ribbon { display: inline-flex; align-items: center; height: 28px; padding: 0 18px 0 12px; color: var(--color-cream); font-family: var(--font-body); font-weight: 600; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 50%, 100% 100%, 0 100%); }
    .ribbon-tomato   { background: var(--accent-tomato); }
    .ribbon-charcoal { background: var(--ink-900); }
    .ribbon-lavender { background: var(--color-lavender); color: var(--ink-900); }
    .ribbon-honey    { background: var(--accent-honey); color: var(--ink-900); }
  </style>
  <div class="ribbon-row">
    <span class="ribbon ribbon-tomato">New</span>
    <span class="ribbon ribbon-tomato">Limited</span>
    <span class="ribbon ribbon-charcoal">Pre-order</span>
    <span class="ribbon ribbon-lavender">Restock</span>
    <span class="ribbon ribbon-honey">Editor's pick</span>
  </div>
  <div class="dim" style="font-size:12px;">Notched right edge. Tomato is the default. Never used as a button.</div>

</div>
</body>
</html>
