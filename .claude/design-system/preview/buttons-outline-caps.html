<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">

  <style>
    .btn { font-family: var(--font-body); font-weight: 600; font-size: 15px; border: 0; cursor: pointer; padding: 12px 22px; border-radius: 999px; display: inline-flex; align-items: center; gap: 8px; transition: background 200ms var(--ease-soft), transform 80ms var(--ease-bounce), box-shadow 200ms var(--ease-soft); }
    .btn-primary { background: var(--ink-900); color: var(--color-cream); }
    .btn-primary:hover { background: #4A4540; }
    .btn-secondary { background: var(--color-lilac); color: var(--ink-900); }
    .btn-secondary:hover { background: #DCC8E8; }
    .btn-accent { background: var(--color-sage); color: var(--ink-900); }
    .btn-accent:hover { background: #B8C6B4; }
    .btn-ghost { background: transparent; color: var(--ink-900); border: 1.5px solid var(--ink-300); }
    .btn-ghost:hover { border-color: var(--ink-700); }
    .btn-outline-caps { background: transparent; color: var(--ink-900); border: 1.5px solid var(--ink-900); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; padding: 10px 18px; }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
  </style>

</head>
<body>
<div class="card">

  <div class="lbl">Outline caps · editorial "see more" pill</div>
  <div class="row" style="gap:12px;">
    <button class="btn btn-outline-caps">See more
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M9 7h8v8"/></svg>
    </button>
    <button class="btn btn-outline-caps">All harps
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M9 7h8v8"/></svg>
    </button>
    <button class="btn btn-outline-caps" style="border-radius:999px; width:44px; height:44px; padding:0; justify-content:center;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
    </button>
  </div>

</div>
</body>
</html>
