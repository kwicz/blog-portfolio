<body>
<div class="card">

  <div class="lbl">Icon set · bespoke single-stroke · 1.75px · rounded caps</div>

    .icon-tile svg { width: 24px; height: 24px; color: var(--ink-900); }
    .icon-tile .nm { font-size: 10px; color: var(--ink-500); letter-spacing: 0.04em; }
  </style>
  <div class="icon-grid">
    <div class="icon-tile"><img src="../assets/icons/cart.svg" alt="" style="width:24px;height:24px;"><div class="nm">cart</div></div><div class="icon-tile"><img src="../assets/icons/search.svg" alt="" style="width:24px;height:24px;"><div class="nm">search</div></div><div class="icon-tile"><img src="../assets/icons/heart.svg" alt="" style="width:24px;height:24px;"><div class="nm">heart</div></div><div class="icon-tile"><img src="../assets/icons/user.svg" alt="" style="width:24px;height:24px;"><div class="nm">user</div></div><div class="icon-tile"><img src="../assets/icons/star.svg" alt="" style="width:24px;height:24px;"><div class="nm">star</div></div><div class="icon-tile"><img src="../assets/icons/pin.svg" alt="" style="width:24px;height:24px;"><div class="nm">pin</div></div><div class="icon-tile"><img src="../assets/icons/truck.svg" alt="" style="width:24px;height:24px;"><div class="nm">truck</div></div><div class="icon-tile"><img src="../assets/icons/note.svg" alt="" style="width:24px;height:24px;"><div class="nm">note</div></div><div class="icon-tile"><img src="../assets/icons/arrow-up-right.svg" alt="" style="width:24px;height:24px;"><div class="nm">arrow-up-right</div></div>
  </div>

</div>
