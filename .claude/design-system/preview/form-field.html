<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">

</head>
<body>
<div class="card">

  <div class="lbl">Form field · rounded · lavender focus glow</div>
  <style>
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--ink-900); }
    .field input { font-family: var(--font-body); font-size: 15px; padding: 12px 16px; border-radius: 14px; border: 1px solid var(--surface-line); background: #fff; color: var(--ink-900); outline: none; transition: box-shadow 160ms var(--ease-soft), border-color 160ms var(--ease-soft); }
    .field input:focus { border-color: var(--color-lavender); box-shadow: 0 0 0 4px rgba(184, 168, 196, 0.25); }
    .field input::placeholder { color: var(--ink-400); }
    .field .hint { font-size: 12px; color: var(--ink-500); }
    .field-error input { border-color: var(--accent-berry); }
    .field-error .hint { color: var(--accent-berry); }
  </style>
  <div class="row" style="gap:18px; align-items:flex-start;">
    <div class="field" style="flex:1 1 0;">
      <label>Postal code</label>
      <input type="text" value="11211" autofocus>
      <span class="hint">Brooklyn — local pickup available</span>
    </div>
    <div class="field field-error" style="flex:1 1 0;">
      <label>Postal code</label>
      <input type="text" value="1121">
      <span class="hint">That postal code doesn't look quite right.</span>
    </div>
  </div>

</div>
</body>
</html>
