<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Katy Lee's Mouth Harps — Storefront</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="store.css">
<link rel="icon" href="../../assets/logo-mark.svg">
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data -->
<script src="data/products.js"></script>
<script src="data/journal.js"></script>

<!-- Components (order matters: Icon first, Button next, then everything that uses them) -->
<script type="text/babel" src="components/Icon.jsx"></script>
<script type="text/babel" src="components/Button.jsx"></script>
<script type="text/babel" src="components/Ribbon.jsx"></script>
<script type="text/babel" src="components/Commerce.jsx"></script>
<script type="text/babel" src="components/Marquee.jsx"></script>
<script type="text/babel" src="components/Header.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Tile.jsx"></script>
<script type="text/babel" src="components/ProductCard.jsx"></script>
<script type="text/babel" src="components/EditorialHeader.jsx"></script>
<script type="text/babel" src="components/CartDrawer.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="screens/HomeScreen.jsx"></script>
<script type="text/babel" src="screens/CollectionsScreen.jsx"></script>
<script type="text/babel" src="screens/ProductScreen.jsx"></script>
<script type="text/babel" src="screens/JournalScreen.jsx"></script>
<script type="text/babel" src="screens/JournalPostScreen.jsx"></script>
<script type="text/babel" src="screens/AboutScreen.jsx"></script>

<!-- App -->
<script type="text/babel">
function App() {
  const [route, setRoute] = React.useState({ screen: 'home' });
  const [cart, setCart] = React.useState([]);
  const [cartOpen, setCartOpen] = React.useState(false);

  // Add a product (optionally with variant + qty) to the bag and open the drawer.
  const addToCart = (input) => {
    const qty = input.qty || 1;
    const variant = input.variant || null;
    setCart(prev => {
      const ex = prev.find(it => it.id === input.id && it.variant === variant);
      if (ex) return prev.map(it => (it === ex ? { ...it, qty: it.qty + qty } : it));
      return [...prev, {
        id: input.id, name: input.name, price: input.price, image: input.image,
        variant, qty,
      }];
    });
    setCartOpen(true);
  };

  // Quantity stepper change. Delta of -current = remove the row.
  const qty = (idx, d) => {
    setCart(prev => {
      const next = [...prev];
      next[idx] = { ...next[idx], qty: Math.max(0, next[idx].qty + d) };
      return next.filter(it => it.qty > 0);
    });
  };

  const cartCount = cart.reduce((s, it) => s + it.qty, 0);

  const announcements = [
    "The Brass One is back, finally",
    "Free US shipping over $50",
    "Hand-tuned in Brooklyn, by four people and one cat",
    "We make about 30 harps a month",
    "Local pickup, weekdays 11\u20136",
    "Care kits included with every harp",
  ];

  const nav = (id) => {
    setRoute({ screen: id });
    window.scrollTo(0, 0);
  };

  const openProduct = (product) => {
    setRoute({ screen: 'product', product });
    window.scrollTo(0, 0);
  };

  const openPost = (post) => {
    setRoute({ screen: 'journal-post', post });
    window.scrollTo(0, 0);
  };

  return (
    <div className="shell">
      <Marquee items={announcements} />
      <Header
        onNavigate={nav}
        onOpenCart={() => setCartOpen(true)}
        cartCount={cartCount}
        current={route.screen}
      />

      {route.screen === 'home' && (
        <HomeScreen onProduct={openProduct} onAddToCart={addToCart} onNavigate={nav} />
      )}
      {route.screen === 'collections' && (
        <CollectionsScreen onProduct={openProduct} onAddToCart={addToCart} onNavigate={nav} />
      )}
      {route.screen === 'product' && (
        <ProductScreen
          product={route.product}
          onBack={() => nav('collections')}
          onAddToCart={addToCart}
          onProduct={openProduct}
          onNavigate={nav}
        />
      )}
      {route.screen === 'journal' && (
        <JournalScreen onPost={openPost} onNavigate={nav} />
      )}
      {route.screen === 'journal-post' && (
        <JournalPostScreen post={route.post} onPost={openPost} onProduct={openProduct} onNavigate={nav} />
      )}
      {route.screen === 'about' && <AboutScreen onNavigate={nav} />}

      <Footer />

      <CartDrawer
        open={cartOpen}
        items={cart}
        onClose={() => setCartOpen(false)}
        onQty={qty}
        onAddItem={addToCart}
        onCheckout={() => alert("Checkout is a sketch in this kit — your bag has " + cartCount + (cartCount === 1 ? " thing" : " things") + " in it.")}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
